<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teacher_login.css">
</head>
<body>

<div class="card">

<h2>Teacher Login</h2>

<form id="teacherLoginForm" >


<div class="input-box">
    <label>Employee ID</label>
    <input type="text" id="employeeId" placeholder="Enter Employee ID">
    
<div class="error" id="emailError">Enter valid email</div>
</div>

<div class="input-box password-wrap">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
<span class="toggle" onclick="togglePass()">Show</span>
<div class="error" id="passError">Password required</div>
</div>

<button type="submit">Login</button>

</form>

<a href="index.html" class="back">← Back to Home</a>

</div>
<script>
    function togglePass(){
        let p=document.getElementById("password");
        p.type=p.type==="password"?"text":"password";
    }
</script>
