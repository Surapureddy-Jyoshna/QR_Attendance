<!DOCTYPE html>
<html>
<head>
<title>Mark Attendance</title>
<link rel="stylesheet" href="scan.css">
</head>
<body>

    <div class="container">
      <div class="card">
    
        <h2>Attendance Verification</h2>
    
        <form id="attendanceForm">
          <input type="text" id="studentName" placeholder="Enter Name" required>
          <input type="text" id="studentId" placeholder="Enter ID" required>
          <button type="submit">Mark Attendance</button>
        </form>
    
        <p id="msg"></p>
    
      </div>
    </div>
</body>    

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session");
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
    deviceId = "DEVICE_" + Math.random().toString(36).substring(2);
    localStorage.setItem("deviceId", deviceId);
}
if(!sessionId){
    document.body.innerHTML="<h2>Invalid QR</h2>";
}

document.getElementById("attendanceForm").onsubmit = async (e)=>{
    e.preventDefault();

    const name = document.getElementById("studentName").value.trim();
    const studentId = document.getElementById("studentId").value.trim();

    if(!name || !studentId){
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ Enter valid details</span>`;
        return;
    }

    document.getElementById("msg").innerHTML = "⏳ Getting location...";

    navigator.geolocation.getCurrentPosition(async (pos)=>{

        try {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            console.log("Sending request...");

           console.log("Session:", sessionId);

const controller = new AbortController();
const timeout = setTimeout(() => controller.abort(), 10000);

try {

    const res = await fetch("https://qr-attendance-1-odo4.onrender.com/student/mark-attendance",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            sessionId,
            studentId,
            name,
            deviceId,
            lat,
            lng
        }),
        signal: controller.signal
    });

    clearTimeout(timeout);

    const data = await res.json();

    console.log("Response:", data);

    if(data.success){
        document.getElementById("msg").innerHTML =
        `<span style="color:green;">✅ Marked at ${data.time}</span>`;
    }else{
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ ${data.message}</span>`;
    }

} catch(err){

    console.error(err);

    if(err.name === "AbortError"){
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ Server taking too long. Try again</span>`;
    } else {
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ Network error</span>`;
    }
}

            const data = await res.json();

            console.log("Response:", data);

            if(data.success){
                document.getElementById("msg").innerHTML =
                `<span style="color:green;">✅ Marked at ${data.time}</span>`;
            }else{
                document.getElementById("msg").innerHTML =
                `<span style="color:red;">❌ ${data.message}</span>`;
            }

        } catch(err){
            console.error(err);
            document.getElementById("msg").innerHTML =
            `<span style="color:red;">❌ Server error</span>`;
        }

    }, (err)=>{
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ Location permission denied</span>`;
    });
};

</script>

</html>
