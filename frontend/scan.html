<!DOCTYPE html>
<html>
<head>
<title>Mark Attendance</title>
<link rel="stylesheet" href="scan.css">
</head>
<body>

    <div class="container">
      <div class="card">
    
        <h2>Attendance Verification</h2>
    
        <form id="attendanceForm">
          <input type="text" id="studentName" placeholder="Enter Name" required>
          <input type="text" id="studentId" placeholder="Enter ID" required>
          <button type="submit">Mark Attendance</button>
        </form>
    
        <p id="msg"></p>
    
      </div>
    </div>
</body>    

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session");

if(!sessionId){
    document.body.innerHTML="<h2>Invalid QR</h2>";
}

// 🔥 CALL BACKEND DIRECTLY (NO FORM NEEDED)
document.getElementById("attendanceForm").onsubmit = async (e)=>{
    e.preventDefault();

    const name = document.getElementById("studentName").value.trim();
    const studentId = document.getElementById("studentId").value.trim();

    if(!name || !studentId){
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ Enter valid details</span>`;
        return;
    }
    const res = await fetch("https://qr-attendance-1-odo4.onrender.com/student/mark-attendance",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            sessionId,
            studentId,
            name
        })
    });

    const data = await res.json();

    if(data.success){

    // ✅ mark this device as used
        localStorage.setItem("attendance_" + sessionId, "true");

        document.getElementById("msg").innerHTML =
        `<span style="color:green;">✅ Marked at ${data.time}</span>`;
    }else{
        document.getElementById("msg").innerHTML =
        `<span style="color:red;">❌ ${data.message}</span>`;
    }
};

</script>

</html>
