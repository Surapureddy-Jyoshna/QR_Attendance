<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="user-info">
      <div class="avatar"><i class="fas fa-chalkboard-teacher"></i></div>
      <div>
        <h3 id="teacherName"></h3>
        <p id="teacherId"></p>

      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a href="#" id="dashboardLink" class="nav-item active" onclick="showDashboard()">
      <i class="fas fa-chart-line"></i> Dashboard
  </a>
  
  <a href="#" id="myClassesLink" class="nav-item" onclick="showMyClasses()">
      <i class="fas fa-book"></i> My Classes
  </a>
  
  
  
  <div id="myClassesContainer" style="margin-left:20px;"></div>
  
    <a href="#" class="nav-item"><i class="fas fa-users"></i> Students</a>
    <a href="#" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
    <a href="#" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
    <a href="#" id="teacherLogout" class="nav-item">
      <i class="fas fa-sign-out-alt"></i> Logout
   </a>
   
   
  </nav>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">

  <header class="dashboard-header">
    <h1>Teacher Dashboard</h1>
    <button class="btn btn-primary" onclick="openClassModal()">+ Create Class</button>

  </header>

  <!-- QR SECTION -->
  <div class="card qr-card">
    <h2>Live Attendance QR</h2>

    <div class="qr-buttons">
      <button class="btn-start" onclick="startAttendance()">Start Attendance</button>
      <button class="btn-close" onclick="closeAttendance()">Close Attendance</button>
    </div>

    <div id="qrWrapper" style="display:none;">
      <div id="qrcode" class="qr-box"></div>
      <p id="timerText" class="timer"></p>
    </div>

  </div>
  <div style="margin-bottom:20px;">
    <label style="font-weight:600;">Select Section:</label>
    <select id="sectionSelect" onchange="loadSectionData()" 
            style="padding:8px 12px; border-radius:6px;">
        <option value="">-- Select Section --</option>
        <option value="A">Section A</option>
        <option value="B">Section B</option>
        <option value="C">Section C</option>
        <option value="D">Section D</option>
        <option value="E">Section E</option>
    </select>
</div>


  <!-- STATS -->
  <div class="stats-grid">

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-book"></i></div>
      <div>
        <h1 id="totalClasses">0</h1>

        <p>Total Classes</p>
      </div>
    </div>

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div>
        <h1 id="totalStudents">0</h1>

        <p>Total Students</p>
      </div>
    </div>

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
      <div>
        <h1 id="todaysAttendance">0%</h1>
        <p>Today's Attendance</p>
      </div>
    </div>
   
  

  </div>
  <div id="myClassesSection" style="display:none; margin-top:20px;">
    <div class="card">
        <h2>My Conducted Classes</h2>
        <div id="classListContainer"></div>
    </div>
</div>
  <!-- Conduct Class Modal -->
<div id="classModal" class="modal-overlay">

  <div class="modal-box">
    <h2>Conduct Class</h2>
  
    <div class="input-group">
        <select id="classSection" style="width:100%; padding:10px;">
            <option value="">Select Section</option>
            <option value="A">Section A</option>
            <option value="B">Section B</option>
            <option value="C">Section C</option>
            <option value="D">Section D</option>
            <option value="E">Section E</option>
        </select>
    </div>
  
    <div class="input-group">
        <input type="date" id="dateInput">
    </div>
  
    <div class="modal-buttons">
        <button class="btn-save" onclick="conductClass()">Save</button>
        <button class="btn-cancel" onclick="closeClassModal()">Cancel</button>
    </div>
  </div>
  

</div>

  
  
</main>
</div>
<!-- Logout Modal -->
<div id="logoutModal" class="modal">
  <div class="modal-content">
    <h3>Confirm Logout</h3>
    <p>Are you sure you want to logout?</p>
    <div class="modal-buttons">
      <button id="confirmLogout" class="btn-danger">Yes, Logout</button>
      <button id="cancelLogout" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  document.getElementById("teacherLogout")
.addEventListener("click", function(e){

    e.preventDefault();

    const confirmLogout = confirm("Are you sure you want to logout?");

    if(confirmLogout){
        localStorage.removeItem("token");
        window.location.href = "home.html";
    }
});

  </script>
<script>
  const logoutBtn = document.getElementById("teacherLogout");
  const modal = document.getElementById("logoutModal");
  const confirmBtn = document.getElementById("confirmLogout");
  const cancelBtn = document.getElementById("cancelLogout");
  
  logoutBtn.addEventListener("click", function(e){
      e.preventDefault();
      modal.style.display = "flex";
  });
  
  cancelBtn.addEventListener("click", function(){
      modal.style.display = "none";
  });
  
  confirmBtn.addEventListener("click", function(){
    localStorage.removeItem("token");
    window.location.href = "teacher_login.html";
});

  </script>
  
  <script src="dashborad.js"></script>

  
</body>
</html>
