<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="user-info">
      <div class="avatar"><i class="fas fa-chalkboard-teacher"></i></div>
      <div>
        <h3>Teacher Name</h3>
        <p>Teacher ID: 12345</p>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a href="#" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="#" class="nav-item"><i class="fas fa-book"></i> My Classes</a>
    <a href="#" class="nav-item"><i class="fas fa-users"></i> Students</a>
    <a href="#" class="nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
    <a href="#" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
    <a href="#" class="nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">

  <header class="dashboard-header">
    <h1>Teacher Dashboard</h1>
    <button class="btn btn-primary">+ Create Class</button>
  </header>

  <!-- QR SECTION -->
  <div class="card qr-card">
    <h2>Live Attendance QR</h2>

    <div class="qr-buttons">
      <button class="btn-start" onclick="startAttendance()">Start Attendance</button>
      <button class="btn-close" onclick="closeAttendance()">Close Attendance</button>
    </div>

    <div id="qrWrapper" style="display:none;">
      <div id="qrcode" class="qr-box"></div>
      <p id="timerText" class="timer"></p>
    </div>

  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-book"></i></div>
      <div>
        <h1>5</h1>
        <p>Total Classes</p>
      </div>
    </div>

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div>
        <h1>120</h1>
        <p>Total Students</p>
      </div>
    </div>

    <div class="card stat-card">
      <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
      <div>
        <h1>85%</h1>
        <p>Today's Attendance</p>
      </div>
    </div>

  </div>

</main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="dashborad.js"></script>

</body>
</html>
